name: adas_app
description: "A new Flutter project."



version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  

  # Icons
  cupertino_icons: ^1.0.8
  
  # Firebase dependencies
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.3

  #camera and ml dependencies
  camera: ^0.11.0
  tflite_flutter: ^0.11.0
  #tflite_flutter_helper: ^0.3.3
  sensors_plus: ^3.0.0
  image: ^4.1.3
  
  # State management
  provider: ^6.1.1
  audioplayers: ^6.0.0

  
  # UI components
  flutter_svg: ^2.0.9
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  
  
  # Local storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Utilities
  intl: ^0.20.2
  permission_handler: ^12.0.1
  
  # Background services and notifications
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^17.2.3
  http: ^1.6.0
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.jpg"
  adaptive_icon_background: "#0A0E1A"  # your app's dark background color
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.jpg"
  min_sdk_android: 21
  
  flutter_lints: ^6.0.0


flutter:

  #icons
  uses-material-design: true
  assets:
    - assets/ml_models/
    - assets/sounds/

  